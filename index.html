<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Text to 3D Proto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-start: #f8fbff;
      --bg-end: #e8f1ff;
      --paper: rgba(255, 255, 255, 0.72);
      --ink: #0b1b2f;
      --muted: #4f627b;
      --primary: #278aff;
      --primary-dark: #0f67d1;
      --good: #26a36e;
      --ring: rgba(39, 138, 255, 0.35);
      --shadow: 0 24px 60px rgba(19, 47, 86, 0.14);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      color: var(--ink);
      background: radial-gradient(circle at 10% 10%, #ffffff 0%, transparent 55%),
        radial-gradient(circle at 90% 80%, #dceaff 0%, transparent 52%),
        linear-gradient(145deg, var(--bg-start), var(--bg-end));
      font-family: "Archivo", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 340px;
      height: 340px;
      border-radius: 42% 58% 61% 39% / 47% 46% 54% 53%;
      z-index: -1;
      opacity: 0.26;
      filter: blur(6px);
    }

    body::before {
      top: -80px;
      right: -80px;
      background: #7bc0ff;
      animation: driftA 16s ease-in-out infinite;
    }

    body::after {
      bottom: -100px;
      left: -100px;
      background: #2f98ff;
      animation: driftB 18s ease-in-out infinite;
    }

    @keyframes driftA {
      0%,
      100% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(-24px, 16px) rotate(10deg); }
    }

    @keyframes driftB {
      0%,
      100% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(26px, -18px) rotate(-8deg); }
    }

    .page {
      width: min(1120px, calc(100% - 2rem));
      margin: 1.4rem auto;
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 1rem;
      align-items: stretch;
      opacity: 0;
      transform: translateY(14px);
      animation: reveal 0.8s ease-out forwards;
    }

    @keyframes reveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card {
      background: var(--paper);
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: var(--radius);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 1.2rem;
      display: grid;
      gap: 1rem;
      align-content: start;
    }

    .eyebrow {
      font-family: "IBM Plex Mono", monospace;
      color: var(--primary-dark);
      letter-spacing: 0.06em;
      font-size: 0.82rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.45rem, 3vw, 2rem);
      line-height: 1.15;
      letter-spacing: 0.01em;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .input-wrap {
      display: grid;
      gap: 0.65rem;
    }

    textarea {
      resize: vertical;
      min-height: 120px;
      max-height: 220px;
      border: 1px solid rgba(39, 138, 255, 0.2);
      border-radius: 16px;
      padding: 0.85rem 0.9rem;
      font-size: 0.97rem;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.85);
      font-family: "IBM Plex Mono", monospace;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 5px var(--ring);
    }

    .hint {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 0.72rem 1rem;
      font-weight: 700;
      font-family: "Archivo", sans-serif;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.25s ease, background 0.25s ease;
      letter-spacing: 0.02em;
    }

    .btn-primary {
      background: linear-gradient(130deg, var(--primary), #49a2ff);
      color: #fff;
      box-shadow: 0 10px 24px rgba(39, 138, 255, 0.38);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(39, 138, 255, 0.45);
    }

    .btn-sub {
      background: rgba(11, 27, 47, 0.08);
      color: var(--ink);
    }

    .btn-sub:hover {
      transform: translateY(-1px);
      background: rgba(11, 27, 47, 0.14);
    }

    .status {
      margin: 0;
      padding: 0.65rem 0.8rem;
      border-radius: 12px;
      background: rgba(38, 163, 110, 0.11);
      color: #0f6c47;
      border: 1px solid rgba(38, 163, 110, 0.28);
      font-size: 0.88rem;
      line-height: 1.5;
    }

    .viewer {
      min-height: 560px;
      padding: 0;
      position: relative;
      overflow: hidden;
    }

    #scene {
      width: 100%;
      height: 100%;
      min-height: 560px;
      display: block;
      background: radial-gradient(circle at 20% 15%, #f6fbff 0%, #d6e8ff 45%, #b8d7ff 100%);
    }

    .scene-label {
      position: absolute;
      right: 1rem;
      top: 1rem;
      margin: 0;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.62);
      color: var(--muted);
      border-radius: 999px;
      padding: 0.42rem 0.72rem;
      font-size: 0.74rem;
      font-family: "IBM Plex Mono", monospace;
      letter-spacing: 0.02em;
    }

    @media (max-width: 900px) {
      .page {
        grid-template-columns: 1fr;
      }

      .viewer,
      #scene {
        min-height: 420px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card panel">
      <div>
        <p class="eyebrow">TEXT TO 3D / UI PROTOTYPE</p>
        <h1>テキスト指示から3Dオブジェクトを生成</h1>
      </div>

      <p class="lead">
        入力したテキストから形状・色・サイズを推定し、右側に3Dプレビューを生成します。
        まずはUIデモとして、キーワードベースの簡易生成ロジックを入れています。
      </p>

      <div class="input-wrap">
        <label for="prompt">プロンプト</label>
        <textarea id="prompt" placeholder="例: 青い金属の球体を作って、少し大きめ">青い金属の球体を作って、少し大きめ</textarea>
        <p class="hint">キーワード例: 球 / 立方体 / 円柱 / トーラス / 赤 / 青 / 緑 / 小さい / 大きい</p>
      </div>

      <div class="controls">
        <button id="generateBtn" class="btn-primary" type="button">Generate 3D</button>
        <button id="randomBtn" class="btn-sub" type="button">ランダム生成</button>
      </div>

      <p id="status" class="status">待機中: プロンプトを入力して「Generate 3D」を押してください。</p>
    </section>

    <section class="card viewer">
      <p id="sceneLabel" class="scene-label">shape: sphere | color: blue | scale: large</p>
      <canvas id="scene"></canvas>
    </section>
  </main>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.165.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.165.0/examples/jsm/controls/OrbitControls.js";

    const promptEl = document.getElementById("prompt");
    const statusEl = document.getElementById("status");
    const labelEl = document.getElementById("sceneLabel");
    const generateBtn = document.getElementById("generateBtn");
    const randomBtn = document.getElementById("randomBtn");
    const canvas = document.getElementById("scene");

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0xd7e9ff, 7, 16);

    const camera = new THREE.PerspectiveCamera(52, 1, 0.1, 100);
    camera.position.set(2.2, 1.9, 3.7);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enablePan = false;
    controls.minDistance = 2;
    controls.maxDistance = 8;

    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x9db8d3, 1.08);
    scene.add(hemiLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.1);
    dirLight.position.set(2, 4, 3);
    scene.add(dirLight);

    const floor = new THREE.Mesh(
      new THREE.CircleGeometry(2.8, 48),
      new THREE.MeshStandardMaterial({ color: 0xeaf4ff, metalness: 0.12, roughness: 0.92 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -1.15;
    scene.add(floor);

    let currentMesh = null;

    function resize() {
      const rect = canvas.getBoundingClientRect();
      const width = Math.max(320, rect.width);
      const height = Math.max(320, rect.height);
      renderer.setSize(width, height, false);
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
    }

    function parsePrompt(text) {
      const t = text.toLowerCase();

      let shape = "sphere";
      if (/cube|box|立方体|キューブ/.test(t)) shape = "box";
      if (/cylinder|円柱|筒/.test(t)) shape = "cylinder";
      if (/torus|donut|ドーナツ|トーラス/.test(t)) shape = "torus";
      if (/cone|円すい|コーン/.test(t)) shape = "cone";
      if (/sphere|ball|球|球体/.test(t)) shape = "sphere";

      let color = 0x278aff;
      let colorName = "blue";
      if (/red|赤/.test(t)) { color = 0xff4d5e; colorName = "red"; }
      if (/green|緑/.test(t)) { color = 0x39b86f; colorName = "green"; }
      if (/yellow|黄/.test(t)) { color = 0xffcb47; colorName = "yellow"; }
      if (/purple|紫/.test(t)) { color = 0x8a67e6; colorName = "purple"; }
      if (/black|黒/.test(t)) { color = 0x2d3540; colorName = "black"; }
      if (/white|白/.test(t)) { color = 0xf5f7fb; colorName = "white"; }
      if (/blue|青/.test(t)) { color = 0x278aff; colorName = "blue"; }

      let scale = 1;
      let scaleName = "medium";
      if (/small|小さい|ミニ/.test(t)) { scale = 0.75; scaleName = "small"; }
      if (/large|big|大きい|巨大/.test(t)) { scale = 1.35; scaleName = "large"; }

      let roughness = 0.35;
      let metalness = 0.35;
      if (/metal|metallic|金属/.test(t)) {
        metalness = 0.75;
        roughness = 0.22;
      }
      if (/matte|マット/.test(t)) {
        metalness = 0.1;
        roughness = 0.8;
      }

      return { shape, color, colorName, scale, scaleName, roughness, metalness };
    }

    function buildGeometry(shape) {
      if (shape === "box") return new THREE.BoxGeometry(1.5, 1.5, 1.5, 2, 2, 2);
      if (shape === "cylinder") return new THREE.CylinderGeometry(0.8, 0.8, 1.8, 36);
      if (shape === "torus") return new THREE.TorusGeometry(0.95, 0.32, 22, 80);
      if (shape === "cone") return new THREE.ConeGeometry(0.9, 1.95, 36);
      return new THREE.SphereGeometry(1, 64, 64);
    }

    function generateFromPrompt(promptText) {
      const parsed = parsePrompt(promptText);

      if (currentMesh) {
        scene.remove(currentMesh);
        currentMesh.geometry.dispose();
        currentMesh.material.dispose();
      }

      const geometry = buildGeometry(parsed.shape);
      const material = new THREE.MeshStandardMaterial({
        color: parsed.color,
        roughness: parsed.roughness,
        metalness: parsed.metalness,
      });

      currentMesh = new THREE.Mesh(geometry, material);
      currentMesh.scale.setScalar(parsed.scale);
      currentMesh.position.y = -0.05;
      scene.add(currentMesh);

      labelEl.textContent = `shape: ${parsed.shape} | color: ${parsed.colorName} | scale: ${parsed.scaleName}`;
      statusEl.textContent = `生成完了: ${parsed.shape} を ${parsed.colorName} で作成しました。`;
    }

    function randomPrompt() {
      const samples = [
        "赤い立方体を作って",
        "緑の円柱で少し大きい",
        "青い金属の球体",
        "黄色のトーラスを小さめで",
        "白いマットなコーン",
      ];
      promptEl.value = samples[Math.floor(Math.random() * samples.length)];
      generateFromPrompt(promptEl.value);
    }

    generateBtn.addEventListener("click", () => {
      const prompt = promptEl.value.trim();
      if (!prompt) {
        statusEl.textContent = "入力エラー: プロンプトを入力してください。";
        return;
      }
      generateFromPrompt(prompt);
    });

    randomBtn.addEventListener("click", randomPrompt);

    window.addEventListener("resize", resize);

    function animate() {
      requestAnimationFrame(animate);
      if (currentMesh) {
        currentMesh.rotation.y += 0.006;
      }
      controls.update();
      renderer.render(scene, camera);
    }

    resize();
    generateFromPrompt(promptEl.value);
    animate();
  </script>
</body>
</html>
